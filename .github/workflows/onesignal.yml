name: Invia Notifica Nuovo Bollettino

on:
  push:
    branches:
      - main # Assicurati che il tuo ramo principale si chiami main (o cambialo in master se necessario)
    paths:
      - 'dati_bollettino.json' # L'azione parte SOLO se questo file viene aggiornato

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Estrai la data dal JSON
        id: parse_json
        run: |
          # Legge la data dal tuo JSON per inserirla nel testo della notifica
          DATA_EMISSIONE=$(jq -r '.data_bollettino' dati_bollettino.json)
          echo "DATA=$DATA_EMISSIONE" >> $GITHUB_ENV

      - name: Invia Notifica tramite OneSignal
        run: |
          curl --request POST \
               --url https://onesignal.com/api/v1/notifications \
               --header "Authorization: Basic ${{ secrets.ONESIGNAL_REST_API_KEY }}" \
               --header "Content-Type: application/json" \
               --data '{
                 "app_id": "62bb3a88-4267-4b6c-b209-5262c35284f8",
                 "included_segments": ["Subscribed Users"],
                 "target_channel": "push",
                 "headings": {"it": "Allerta Basilicata", "en": "Allerta Basilicata"},
                 "contents": {"it": "È disponibile il nuovo bollettino di criticità regionale del ${{ env.DATA }}. Clicca per i dettagli.", "en": "Nuovo bollettino disponibile."},
                 "url": "https://www.formazionesicurezza.org/protezionecivile/bollettino/index.html?view=map"
               }'
